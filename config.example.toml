# Layout mode: "rows" (stacked, auto-sized) or "absolute" (percentage positioning)
layout = "rows"

# Theme: preset name, custom [theme] block, or omit for terminal defaults.
# Presets: gruvbox, catppuccin-mocha, catppuccin-latte, nord, tokyo-night, dracula, solarized-dark
theme = "catppuccin-mocha"

# Or full custom theme:
# [theme]
# fg = "#cdd6f4"
# bg = "#1e1e2e"
# accent = "#89b4fa"
# dim = "#585b70"
# border = "rounded"

# --- Rows Layout ---
# Zones stack top-to-bottom. Heights are in character rows.
# Zones with the same 'row' value form columns within that row.
# Omit 'height' to fill remaining space.
# 'width' is always a percentage (for columns within a row).

[[zones]]
id = "clock"
widget = "clock"
height = 13

  [zones.config]
  format = "12hr"   # "12hr" or "24hr"

# These three share row 2 — they become columns
[[zones]]
id = "weather"
widget = "weather"
row = 2
width = 33

  [zones.config]
  # Set to your location — find coordinates at https://open-meteo.com
  latitude = 40.7128
  longitude = -74.0060
  units = "fahrenheit"   # "fahrenheit" or "celsius"

[[zones]]
id = "date"
widget = "date"
row = 2
width = 34

  [zones.config]
  format = "%A, %B %d, %Y"

[[zones]]
id = "stats"
widget = "system"
row = 2
width = 33

[[zones]]
id = "quote"
widget = "text"
height = 3

  [zones.config]
  content = "Stay focused. Stay vigilant."
  # align = "center"   # "left", "center", or "right"
  # title = "Quote"
